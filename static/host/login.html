<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Hayaoshy 司会者ログイン" />
    <title>Hayaoshy - 司会者ログイン</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/host/style.css" />
  </head>
  <body class="login-page">

    <div class="login-wrapper">
      <div class="login-brand">
        <div class="brand-logo" aria-hidden="true">⚡</div>
        <h1 class="brand-name">Hayaoshy</h1>
        <p class="brand-sub">司会者ログイン</p>
      </div>

      <div class="login-card glass">
        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="username" class="form-label">ユーザー名</label>
            <input
              id="username"
              type="text"
              class="form-input"
              placeholder="host"
              autocomplete="username"
              autocorrect="off"
              spellcheck="false"
              required
            />
          </div>
          <div class="form-group" style="margin-top: 16px;">
            <label for="password" class="form-label">パスワード</label>
            <input
              id="password"
              type="password"
              class="form-input"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
          </div>

          <p id="login-error" class="error-msg" role="alert" aria-live="polite"></p>

          <button type="submit" id="login-btn" class="btn-primary" style="margin-top: 28px;">
            <span id="login-btn-text">ログイン</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
              viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
          </button>
        </form>
      </div>
    </div>

    <script>
      // 既にトークンがあれば /host にリダイレクト
      if (sessionStorage.getItem('hayaoshy_token')) {
        window.location.replace('/host');
      }

      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errEl = document.getElementById('login-error');
        const btn   = document.getElementById('login-btn');
        const btnTx = document.getElementById('login-btn-text');

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
          errEl.textContent = 'ユーザー名とパスワードを入力してください';
          return;
        }

        btn.disabled      = true;
        btnTx.textContent = 'ログイン中...';
        errEl.textContent = '';

        try {
          const resp = await fetch('/api/host/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });

          if (!resp.ok) {
            const body = await resp.json().catch(() => ({}));
            errEl.textContent = body.detail || 'ログインに失敗しました';
            btn.disabled      = false;
            btnTx.textContent = 'ログイン';
            return;
          }

          const { token } = await resp.json();
          sessionStorage.setItem('hayaoshy_token', token);
          window.location.replace('/host');
        } catch {
          errEl.textContent = 'サーバーへの接続に失敗しました';
          btn.disabled      = false;
          btnTx.textContent = 'ログイン';
        }
      });
    </script>
  </body>
</html>
