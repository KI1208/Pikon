<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Hayaoshy 司会者コントロールパネル" />
    <title>Hayaoshy - 司会者パネル</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/host/style.css" />
  </head>
  <body>

    <!-- ===================================================== -->
    <!-- Top bar                                                -->
    <!-- ===================================================== -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="topbar-logo" aria-hidden="true">⚡</span>
        <span class="topbar-title">Hayaoshy</span>
        <span class="topbar-role">司会者パネル</span>
        <span class="room-id-badge" id="room-id-badge" style="margin-left: 12px; font-size: 13px; font-weight: 600; background: rgba(0, 255, 204, 0.15); color: #00ffcc; padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(0, 255, 204, 0.3); font-family: monospace;">Room: ---</span>
      </div>
      <div class="topbar-right">
        <div class="conn-indicator" id="conn-indicator" aria-label="接続状態">
          <span class="conn-dot" id="conn-dot"></span>
          <span id="conn-label">接続中...</span>
        </div>
        <button class="btn-logout" id="logout-btn" aria-label="ログアウト">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
            viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          ログアウト
        </button>
      </div>
    </header>

    <!-- ===================================================== -->
    <!-- Main layout: sidebar + content                         -->
    <!-- ===================================================== -->
    <div class="layout">

      <!-- Sidebar: Participants -->
      <aside class="sidebar glass-dark">
        <div class="sidebar-header">
          <h2 class="sidebar-title">参加者</h2>
          <span class="participant-count" id="participant-count">0 人</span>
        </div>

        <!-- QR Code -->
        <div class="qr-section">
          <p class="qr-label">参加者用 QR コード</p>
          <div class="qr-frame glass">
            <img id="qr-img" alt="参加者用QRコード" class="qr-img" />
          </div>
          <p class="qr-url" id="qr-url"></p>
        </div>

        <!-- Participant list -->
        <div class="participant-list-wrapper">
          <div id="participant-list" class="participant-list" aria-label="参加者リスト">
            <p class="empty-msg">参加者を待っています...</p>
          </div>
        </div>
      </aside>

      <!-- Main content -->
      <main class="content">

        <!-- Status strip -->
        <div class="status-strip glass">
          <div class="status-info">
            <span class="status-label">ステータス</span>
            <span id="status-badge" class="host-status-badge badge-waiting" aria-live="polite">待機中</span>
          </div>
          <div class="status-info">
            <span class="status-label">問題番号</span>
            <span id="question-label" class="question-num" aria-live="polite">1</span>
          </div>
        </div>

        <!-- Control buttons -->
        <section class="control-section" aria-label="操作ボタン">
          <h3 class="section-title">操作</h3>
          <div class="control-grid">
            <button id="btn-open" class="ctrl-btn btn-open" aria-label="ボタンを開放">
              <span class="ctrl-icon">🟢</span>
              <span class="ctrl-label">ボタン開放</span>
              <span class="ctrl-sub">参加者の押下を有効化</span>
            </button>
            <button id="btn-close" class="ctrl-btn btn-close" disabled aria-label="締め切る">
              <span class="ctrl-icon">🔴</span>
              <span class="ctrl-label">締め切る</span>
              <span class="ctrl-sub">受付を終了し順位を確定</span>
            </button>
            <button id="btn-next" class="ctrl-btn btn-next" disabled aria-label="次の候補へ">
              <span class="ctrl-icon">⏭️</span>
              <span class="ctrl-label">次の候補へ</span>
              <span class="ctrl-sub">不正解 → 次の人を表示</span>
            </button>
            <button id="btn-reset" class="ctrl-btn btn-reset" disabled aria-label="次の問題へ">
              <span class="ctrl-icon">🔄</span>
              <span class="ctrl-label">次の問題へ</span>
              <span class="ctrl-sub">正解 → 問題をリセット</span>
            </button>
          </div>
        </section>

        <!-- Ranking section -->
        <section class="ranking-section" aria-label="回答順位">
          <h3 class="section-title">回答順位</h3>
          <div id="ranking-container" class="ranking-container">
            <p class="empty-msg">まだ回答者がいません</p>
          </div>
        </section>

      </main>
    </div>

    <script src="/static/host/app.js"></script>
  </body>
</html>
